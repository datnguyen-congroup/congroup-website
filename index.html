<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ConGroup - Happiness from Creating Value</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="page">

  <!-- Watermark: Trống đồng + Icon chồng giữa -->
  <div class="bg-watermark-wrap" aria-hidden="true">
    <img class="troung-dong" src="assets/trong-dong.svg" alt="" />
    <img class="bg-icon"     src="assets/icon.svg"       alt="" />
  </div>

  <div class="content">

    <!-- Logo ConGroup -->
    <div class="logo-wrap">
      <img src="assets/logo-en.svg" alt="ConGroup – Happiness from Creating Value" />
    </div>

    <!-- Trích dẫn -->
    <div class="quote-block">
      <p>Lão Tử dạy <i>"Hành Trình Vạn Dặm Bắt Đầu Từ Một Bước Chân"</i>. ConGroup cùng tin điều đó<br class="desktop-only" />
      và đang bước những bước đầu tiên của chính mình. Cảm ơn bạn đã ghé thăm và mong được kết nối.</p>
    </div>

    <!-- Thông tin liên hệ -->
    <div class="contact-block">
      <p class="contact-name">Hoàng Tuấn - Founder của ConGroup</p>
      <p class="contact-info">
        Điện thoại/ Zalo: +84 36 588 1368<br />
        Email: Tuan.HoangAnh@ConGroup.vn
      </p>
    </div>

    <!-- Cụm logo sub-brand – Mobile (2×3) -->
    <div class="logo-cluster logo-cluster-mobile">
      <img src="assets/logo-cluster-mobile.svg" alt="ConHeritage, ConFood, ConDigital, ConTrüst, ConWash, ConComfort" />
    </div>

    <!-- Cụm logo sub-brand – Desktop -->
    <div class="logo-cluster logo-cluster-desktop">
      <img src="assets/logo-cluster-desktop.svg" alt="ConHeritage, ConFood, ConDigital, ConTrüst, ConWash, ConComfort" />
    </div>

  </div>
</div>
</body>
</html>
